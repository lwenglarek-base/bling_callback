<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bling OAuth - Callback</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.1);
            max-width: 560px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        .code-box {
            background: #f7f8fa;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            color: #1a1a1a;
            position: relative;
            text-align: left;
        }
        .code-box.success { border-color: #28a745; background: #f0fff4; }
        .code-box.error { border-color: #dc3545; background: #fff5f5; }
        .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .code-value { font-size: 18px; font-weight: 600; padding: 8px 0; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #0066ff; color: #fff; }
        .btn-primary:hover { background: #0052cc; }
        .btn-primary:active { transform: scale(0.98); }
        .copied { background: #28a745 !important; }
        .instructions {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e1e4e8;
            text-align: left;
        }
        .instructions p { color: #444; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
        .instructions strong { color: #1a1a1a; }
        .error-msg { color: #dc3545; font-size: 15px; margin: 16px 0; }
    </style>
</head>
<body>
    <div class="card" id="app"></div>
    <script>
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var state = params.get('state');
        var error = params.get('error');
        var app = document.getElementById('app');

        if (error) {
            app.innerHTML =
                '<div class="icon">&#10060;</div>' +
                '<h1>Erro na Autoriza\u00e7\u00e3o</h1>' +
                '<div class="error-msg">' + escapeHtml(error) + '</div>' +
                '<p class="subtitle">Tente novamente a partir do addon.</p>';
        } else if (code) {
            app.innerHTML =
                '<div class="icon">&#9989;</div>' +
                '<h1>Autoriza\u00e7\u00e3o Conclu\u00edda!</h1>' +
                '<p class="subtitle">Copie o c\u00f3digo abaixo e cole no addon (Passo 3).</p>' +
                '<div class="code-box success">' +
                    '<span class="label">C\u00f3digo de Autoriza\u00e7\u00e3o</span>' +
                    '<div class="code-value" id="codeValue">' + escapeHtml(code) + '</div>' +
                '</div>' +
                '<button class="btn btn-primary" id="copyBtn" onclick="copyCode()">Copiar C\u00f3digo</button>' +
                '<div class="instructions">' +
                    '<p><strong>Pr\u00f3ximo passo:</strong></p>' +
                    '<p>1. Volte ao addon Transfer\u00eancia Full</p>' +
                    '<p>2. Cole o c\u00f3digo no campo "C\u00f3digo de Autoriza\u00e7\u00e3o" (Passo 3)</p>' +
                    '<p>3. Clique em "Autorizar e Conectar"</p>' +
                    '<p>4. Pode fechar esta aba</p>' +
                '</div>';
        } else {
            app.innerHTML =
                '<div class="icon">&#128279;</div>' +
                '<h1>P\u00e1gina de Callback OAuth - Bling</h1>' +
                '<p class="subtitle">Esta p\u00e1gina recebe o redirecionamento do Bling ap\u00f3s a autoriza\u00e7\u00e3o.<br>Use a URL desta p\u00e1gina como "URL de Redirecionamento" no seu aplicativo Bling.</p>' +
                '<div class="code-box">' +
                    '<span class="label">URL de Redirecionamento</span>' +
                    '<div class="code-value" style="font-size:13px;" id="pageUrl">' + escapeHtml(window.location.origin + window.location.pathname) + '</div>' +
                '</div>' +
                '<button class="btn btn-primary" onclick="copyPageUrl()">Copiar URL</button>';
        }

        function copyCode() {
            var code = document.getElementById('codeValue').textContent;
            navigator.clipboard.writeText(code).then(function() {
                var btn = document.getElementById('copyBtn');
                btn.textContent = 'Copiado!';
                btn.classList.add('copied');
                setTimeout(function() { btn.textContent = 'Copiar C\u00f3digo'; btn.classList.remove('copied'); }, 2000);
            });
        }

        function copyPageUrl() {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname);
        }

        function escapeHtml(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
